<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"><title>Accesso Negato</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#04060f;color:#e8f0ff;display:flex;align-items:center;justify-content:center;height:100vh}
    .box{text-align:center;max-width:420px;padding:40px}
    .icon{font-size:64px;margin-bottom:20px}
    h1{font-size:22px;font-weight:700;color:#f87171;margin-bottom:10px}
    p{color:#8ba8cc;font-size:14px;margin-bottom:24px;line-height:1.6}
    a{display:inline-block;padding:10px 24px;background:rgba(0,82,180,.14);border:1px solid rgba(59,142,234,.35);border-radius:6px;color:#3b8eea;text-decoration:none;font-size:12px;font-weight:600;letter-spacing:1px}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🚫</div>
    <h1>Accesso Negato</h1>
    <p>{{ motivo }}</p>
    <a href="/">← Torna al login</a>
  </div>
</body>
</html>
